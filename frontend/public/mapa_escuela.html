<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CECyTEH Plantel Santiago Tulantepec · Vista Satelital 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0b0f14;
    --panel: rgba(15,22,32,0.92);
    --border: rgba(0,200,255,0.15);
    --accent: #00c8ff;
    --accent2: #ff6b00;
    --text: #c8dde8;
    --muted: #4a6578;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:36px; height:36px;
    background: linear-gradient(135deg, var(--accent), #0056ff);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
  }
  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .subtitle { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; }

  .coords-bar {
    font-family: 'Rajdhani', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    background: rgba(0,200,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
  }

  .main { display:flex; flex:1; overflow:hidden; }

  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
    gap: 14px;
    overflow-y: auto;
    backdrop-filter: blur(10px);
  }

  .sec-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
    margin-bottom: 2px;
  }

  .marker-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(0,200,255,0.04);
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
  }
  .marker-btn:hover { background: rgba(0,200,255,0.12); border-color: var(--accent); }
  .marker-btn.active { background: rgba(0,200,255,0.15); border-color: var(--accent); }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .marker-name { font-size: 0.72rem; font-weight: 600; color: var(--text); }
  .marker-desc { font-size: 0.58rem; color: var(--muted); }

  .ctrl-btn {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(0,200,255,0.1); }
  .ctrl-btn.orange { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn.orange:hover { background: rgba(255,107,0,0.1); }

  .slider-wrap { display:flex; flex-direction:column; gap:4px; }
  .slider-wrap label { font-size:0.62rem; color:var(--muted); }
  input[type=range] {
    width:100%; accent-color: var(--accent);
    background: transparent;
  }

  #canvas-wrap { flex:1; position:relative; overflow:hidden; }
  canvas { display:block; }

  .hud-hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 0.62rem;
    color: var(--muted);
    pointer-events: none;
    white-space: nowrap;
    backdrop-filter: blur(6px);
  }

  .tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    pointer-events: none;
    display: none;
    backdrop-filter: blur(8px);
    z-index: 20;
  }
  .tooltip .tt-name { font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:700; color:var(--accent); }
  .tooltip .tt-desc { font-size:0.65rem; color:var(--muted); margin-top:2px; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .menu-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: rgba(0,200,255,0.08);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
    z-index: 30;
    transition: background 0.2s;
  }
  .menu-toggle:hover { background: rgba(0,200,255,0.18); }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 19;
  }

  @media (max-width: 700px) {
    h1 { font-size: 0.82rem; }
    .subtitle { display: none; }
    .coords-bar { font-size: 0.68rem; padding: 4px 10px; }
    header { padding: 8px 12px; gap: 8px; }
    .menu-toggle { display: flex; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100%;
      width: 260px;
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      padding-top: 60px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main { flex-direction: column; }
    #canvas-wrap { flex: 1; min-height: 0; }
    .hud-hint { font-size: 0.56rem; padding: 5px 12px; bottom: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</div>
    <div class="logo-icon">🏫</div>
    <div>
      <h1>CECyTEH · Plantel Santiago Tulantepec</h1>
      <div class="subtitle">Vista Satelital 3D Interactiva · Lat 20.0388 · Lon -98.3548</div>
    </div>
  </div>
  <div class="coords-bar" id="hud-coords">— Hover sobre el mapa —</div>
</header>

<div class="main">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div>
      <div class="sec-label">Zonas del Plantel</div>
      <div id="marker-list" style="display:flex;flex-direction:column;gap:5px;"></div>
    </div>
    <div>
      <div class="sec-label">Cámara</div>
      <button class="ctrl-btn" onclick="resetCamera()">↺ Resetear vista</button>
      <button class="ctrl-btn" onclick="topView()" style="margin-top:5px">⬆ Vista cenital</button>
    </div>
    <div>
      <div class="sec-label">Elevación del mapa</div>
      <div class="slider-wrap">
        <label>Altura · <span id="hVal">0.4</span></label>
        <input type="range" id="heightSlider" min="0" max="1" step="0.01" value="0.4" oninput="updateHeight(this.value)">
      </div>
    </div>
    <div>
      <div class="sec-label">Etiquetas</div>
      <button class="ctrl-btn" onclick="toggleLabels()">⊙ Alternar etiquetas</button>
      <button class="ctrl-btn orange" onclick="toggleGrid()" style="margin-top:5px">⊞ Cuadrícula</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <div class="tooltip" id="tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-desc" id="tt-desc"></div>
    </div>
    <!-- Panel de horarios -->
    <div id="sched-panel" style="
      display:none;
      position:absolute;
      top:10px; right:10px;
      width:330px;
      max-height:calc(100% - 20px);
      overflow-y:auto;
      background:rgba(8,14,22,0.96);
      border:1px solid rgba(0,200,255,0.35);
      border-radius:10px;
      padding:14px 14px 10px;
      z-index:25;
      backdrop-filter:blur(10px);
      font-family:'Exo 2',sans-serif;
      font-size:0.7rem;
      color:#c8dde8;
    ">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div id="sp-title" style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:#00c8ff;letter-spacing:.08em"></div>
        <button onclick="document.getElementById('sched-panel').style.display='none'" style="background:none;border:none;color:#4a6578;font-size:1.1rem;cursor:pointer;line-height:1">✕</button>
      </div>
      <div id="sp-body"></div>
    </div>
    <div class="hud-hint" id="hud-hint">🖱 Arrastrar: orbitar &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Clic derecho: pan &nbsp;|&nbsp; 👆 1 dedo: orbitar &nbsp;|&nbsp; 🤏 2 dedos: zoom/pan</div>
  </div>
</div>

// ── ESCENA THREE.JS ─────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080c14);
scene.fog = new THREE.Fog(0x080c14, 20, 60);

const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 200);
camera.position.set(0, 5, 9);
camera.lookAt(0, 0, 0);

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(5, 10, 5);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x6090ff, 0.3);
fill.position.set(-5, 3, -5);
scene.add(fill);

const img = new Image();
img.onload = () => {
  const tex = new THREE.Texture(img);
  tex.needsUpdate = true;
  const geo = new THREE.PlaneGeometry(PLANE_W, PLANE_H);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness:0.7, metalness:0.05 });
  mapMesh = new THREE.Mesh(geo, mat);
  mapMesh.rotation.x = -Math.PI / 2;
  mapMesh.position.y = 0.4;
  mapMesh.receiveShadow = true;
  scene.add(mapMesh);
};
img.src = 'data:image/png;base64,' + IMG_B64;

const gridHelper = new THREE.GridHelper(20, 20, 0x003344, 0x002233);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// ── LABEL SPRITE ─────────────────────────────────────────────────────────────
function makeLabel(name, color) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ct = c.getContext('2d');
  ct.fillStyle = 'rgba(8,12,20,0.82)';
  ct.roundRect(0,0,256,64,12); ct.fill();
  ct.strokeStyle = color; ct.lineWidth = 2;
  ct.roundRect(1,1,254,62,12); ct.stroke();
  ct.fillStyle = color;
  ct.font = 'bold 20px Exo 2, sans-serif';
  ct.textAlign = 'center'; ct.textBaseline = 'middle';
  ct.fillText(name.length>18?name.slice(0,17)+'…':name,128,50);
  return new THREE.CanvasTexture(c);
}

function uvToWorld(uv) {
  const x = (uv[0] - 0.5) * PLANE_W;
  const z = (uv[1] - 0.5) * PLANE_H;
  return new THREE.Vector3(x, 0, z);
}

MARKERS.forEach((m, i) => {
  const pos = uvToWorld(m.uv);
  const group = new THREE.Group();
  group.position.copy(pos);

  const cyl = new THREE.CylinderGeometry(0.04, 0.04, 0.35, 8);
  const cylMat = new THREE.MeshPhongMaterial({ color: new THREE.Color(m.color), emissive: new THREE.Color(m.color), emissiveIntensity:0.5 });
  const stem = new THREE.Mesh(cyl, cylMat);
  stem.position.y = 0.175;
  group.add(stem);

  const sphere = new THREE.SphereGeometry(0.1, 16, 16);
  const sphereMat = new THREE.MeshPhongMaterial({ color: new THREE.Color(m.color), emissive: new THREE.Color(m.color), emissiveIntensity:0.6, shininess:80 });
  const head = new THREE.Mesh(sphere, sphereMat);
  head.position.y = 0.45;
  group.add(head);

  const ring = new THREE.RingGeometry(0.12, 0.18, 24);
  const ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(m.color), transparent:true, opacity:0.5, side:THREE.DoubleSide });
  const ringMesh = new THREE.Mesh(ring, ringMat);
  ringMesh.rotation.x = -Math.PI/2;
  ringMesh.position.y = 0.01;
  group.add(ringMesh);

  const labelTex = makeLabel(m.name, m.color);
  const spriteMat = new THREE.SpriteMaterial({ map:labelTex, transparent:true, opacity:0.95 });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(1.6, 0.8, 1);
  sprite.position.y = 0.85;
  group.add(sprite);

  group.userData = { marker: m, ring: ringMesh, sprite, phase: Math.random()*Math.PI*2 };
  scene.add(group);
  markerGroups.push(group);
});

// ── SIDEBAR MARKER LIST ──────────────────────────────────────────────────────
const listEl = document.getElementById('marker-list');
MARKERS.forEach((m, i) => {
  const btn = document.createElement('div');
  btn.className = 'marker-btn';
  btn.id = 'mbtn-'+i;
  btn.innerHTML = `
    <div class="dot" style="background:${m.color};box-shadow:0 0 6px ${m.color}"></div>
    <div>
      <div class="marker-name">${m.name}</div>
      <div class="marker-desc">${m.desc}</div>
    </div>`;
  btn.onclick = () => { flyToMarker(i); showSchedPanel(m); };
  listEl.appendChild(btn);
});

// ── ORBIT CONTROLS ───────────────────────────────────────────────────────────
let isDragging=false, isRight=false;
let prevM={x:0,y:0};
let sph={theta:0.3, phi:1.1, r:9};
const target=new THREE.Vector3(0,0,0);

function updateCamera() {
  camera.position.set(
    target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    target.y + sph.r*Math.cos(sph.phi),
    target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(target);
}
updateCamera();

const cv = renderer.domElement;
cv.addEventListener('mousedown', e => { isDragging=true; isRight=e.button===2; prevM={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx=e.clientX-prevM.x, dy=e.clientY-prevM.y;
  prevM={x:e.clientX,y:e.clientY};
  if(isRight) {
    const sc=0.004*sph.r;
    const right=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), camera.position.clone().sub(target).normalize()).normalize();
    target.addScaledVector(right, dx*sc);
    target.y += dy*sc;
  } else {
    sph.theta -= dx*0.005;
    sph.phi = Math.max(0.08, Math.min(Math.PI/2, sph.phi + dy*0.005));
  }
  updateCamera();
});
cv.addEventListener('wheel', e => {
  sph.r = Math.max(1.5, Math.min(25, sph.r + e.deltaY*0.01));
  updateCamera();
},{passive:true});
cv.addEventListener('contextmenu', e=>e.preventDefault());

let planeHeight = 0.4;
function updateHeight(v) {
  planeHeight = parseFloat(v);
  document.getElementById('hVal').textContent = parseFloat(v).toFixed(2);
  markerGroups.forEach(g=>{ g.position.y = planeHeight; });
  if(mapMesh) mapMesh.position.y = planeHeight;
  gridHelper.position.y = planeHeight;
}

function resetCamera() {
  sph={theta:0.3,phi:1.1,r:9};
  target.set(0,0,0);
  updateCamera();
}
function topView() {
  sph={theta:0.3,phi:0.15,r:12};
  updateCamera();
}

let flyActive=false, flyTarget=null, flyProgress=0;
function flyToMarker(i) {
  const m=MARKERS[i];
  const pos=uvToWorld(m.uv);
  flyTarget={
    tx:pos.x, ty:0, tz:pos.z,
    theta:sph.theta, phi:0.7, r:4
  };
  flyProgress=0; flyActive=true;
  document.querySelectorAll('.marker-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mbtn-'+i).classList.add('active');
}

function toggleLabels() {
  showLabels = !showLabels;
  markerGroups.forEach(g => { g.userData.sprite.visible = showLabels; });
}
function toggleGrid() {
  showGrid = !showGrid;
  gridHelper.visible = showGrid;
}

const raycaster = new THREE.Raycaster();
const mouse2d = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  mouse2d.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse2d.y = -((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2d, camera);
  const spheres = markerGroups.map(g=>g.children[1]);
  const hits = raycaster.intersectObjects(spheres);
  if(hits.length>0) {
    const idx = spheres.indexOf(hits[0].object);
    const m = MARKERS[idx];
    document.getElementById('tt-name').textContent = m.name;
    document.getElementById('tt-desc').textContent = m.desc;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX - rect.left + 14)+'px';
    tooltip.style.top=(e.clientY - rect.top - 10)+'px';
    cv.style.cursor='pointer';
  } else {
    tooltip.style.display='none';
    cv.style.cursor='default';
  }
  const ph = new THREE.Plane(new THREE.Vector3(0,1,0), -planeHeight);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(ph, pt);
  if(pt) {
    const u=(pt.x/PLANE_W+0.5).toFixed(3);
    const v=(pt.z/PLANE_H+0.5).toFixed(3);
    const lat=(20.0388 + (0.5-v)*0.0035).toFixed(5);
    const lon=(-98.3548 + (u-0.5)*0.0035).toFixed(5);
    document.getElementById('hud-coords').textContent=`Lat ${lat}  Lon ${lon}`;
  }
});

function showSchedPanel(m) {
  if(!m.horario) return;
  const panel = document.getElementById('sched-panel');
  document.getElementById('sp-title').textContent = m.name;
  const days = ['LUN','MAR','MIÉ','JUE','VIE'];
  const dayColors = {LUN:'#00c8ff',MAR:'#00e5a0',MIÉ:'#ffd700',JUE:'#ff9f40',VIE:'#ff6b00'};
  let html = '';
  for(const [aula, turnos] of Object.entries(m.horario)) {
    html += `<div style="margin-bottom:12px">
      <div style="font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:700;color:#00c8ff;border-bottom:1px solid rgba(0,200,255,0.2);padding-bottom:3px;margin-bottom:6px">${aula}</div>`;
    for(const [turno, sched] of Object.entries(turnos)) {
      html += `<div style="margin-bottom:6px">
        <div style="font-size:0.65rem;color:#4a6578;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px">${turno}</div>
        <table style="width:100%;border-collapse:collapse">`;
      for(const d of days) {
        const val = sched[d] || '—';
        if(val === '—') continue;
        html += `<tr style="border-bottom:1px solid rgba(0,200,255,0.07)">
          <td style="padding:2px 6px 2px 0;color:${dayColors[d]};font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.72rem;white-space:nowrap;vertical-align:top">${d}</td>
          <td style="padding:2px 0;line-height:1.4">${val}</td>
        </tr>`;
      }
      html += `</table></div>`;
    }
    html += `</div>`;
  }
  document.getElementById('sp-body').innerHTML = html;
  panel.style.display = 'block';
}

cv.addEventListener('click', e => {
  const rect=cv.getBoundingClientRect();
  mouse2d.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse2d.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2d, camera);
  const spheres=markerGroups.map(g=>g.children[1]);
  const hits=raycaster.intersectObjects(spheres);
  if(hits.length>0) {
    const idx = spheres.indexOf(hits[0].object);
    flyToMarker(idx);
    showSchedPanel(MARKERS[idx]);
  }
});

const edgeMat = new THREE.LineBasicMaterial({ color:0x00c8ff, opacity:0.4, transparent:true });
const edgeGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(PLANE_W, PLANE_H));
const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
edgeMesh.rotation.x = -Math.PI/2;
edgeMesh.position.y = 0.001;
scene.add(edgeMesh);

let t=0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  markerGroups.forEach(g => {
    const ring=g.userData.ring;
    const s=1+0.35*Math.sin(t*2+g.userData.phase);
    ring.scale.setScalar(s);
    ring.material.opacity=0.5-0.3*Math.abs(Math.sin(t*2+g.userData.phase));
  });
  if(flyActive && flyTarget) {
    flyProgress += 0.035;
    const k=Math.min(flyProgress,1);
    const ease=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    target.x += (flyTarget.tx - target.x)*ease*0.1;
    target.y += (flyTarget.ty - target.y)*ease*0.1;
    target.z += (flyTarget.tz - target.z)*ease*0.1;
    sph.phi += (flyTarget.phi - sph.phi)*ease*0.08;
    sph.r += (flyTarget.r - sph.r)*ease*0.08;
    updateCamera();
    if(flyProgress>=1) flyActive=false;
  }
  renderer.render(scene, camera);
}
animate();

// ── SIDEBAR TOGGLE (MOBILE) ────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  const isOpen = sb.classList.contains('open');
  sb.classList.toggle('open', !isOpen);
  ov.classList.toggle('open', !isOpen);
}

// ── TOUCH CONTROLS ────────────────────────────────────────────────────────
let touches = {};
let prevTouchMid = null;
let prevPinchDist = null;

function getTouchById(id) { return touches[id]; }

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
  const ids = Object.keys(touches);
  if (ids.length === 2) {
    const a = touches[ids[0]], b = touches[ids[1]];
    prevTouchMid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    prevPinchDist = Math.hypot(b.x - a.x, b.y - a.y);
  }
}, { passive: false });

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    const id = ids[0];
    const cur = touches[id];
    const prev = getTouchById(id) || cur;
    const dx = cur.x - prev.x, dy = cur.y - prev.y;
    sph.theta -= dx * 0.005;
    sph.phi = Math.max(0.08, Math.min(Math.PI / 2, sph.phi + dy * 0.005));
    updateCamera();
  } else if (ids.length === 2) {
    const a = touches[ids[0]], b = touches[ids[1]];
    const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    if (prevPinchDist !== null) {
      const scale = prevPinchDist / dist;
      sph.r = Math.max(1.5, Math.min(25, sph.r * scale));
    }
    if (prevTouchMid !== null) {
      const dmx = mid.x - prevTouchMid.x;
      const dmy = mid.y - prevTouchMid.y;
      const sc = 0.004 * sph.r;
      const right = new THREE.Vector3().crossVectors(
        new THREE.Vector3(0, 1, 0),
        camera.position.clone().sub(target).normalize()
      ).normalize();
      target.addScaledVector(right, -dmx * sc);
      target.y += dmy * sc;
    }
    prevTouchMid = mid;
    prevPinchDist = dist;
    updateCamera();
  }
}, { passive: false });

cv.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    delete touches[t.identifier];
  }
  const ids = Object.keys(touches);
  if (ids.length < 2) {
    prevTouchMid = null;
    prevPinchDist = null;
  }
}, { passive: false });

cv.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1 && Object.keys(touches).length === 0) {
    const t = e.changedTouches[0];
    const rect = cv.getBoundingClientRect();
    mouse2d.x = ((t.clientX - rect.left) / rect.width) * 2 - 1;
    mouse2d.y = -((t.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse2d, camera);
    const spheres = markerGroups.map(g => g.children[1]);
    const hits = raycaster.intersectObjects(spheres);
    if (hits.length > 0) {
      flyToMarker(spheres.indexOf(hits[0].object));
    }
  }
}, { passive: false });
</script>
